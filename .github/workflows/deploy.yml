name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO: github-agent

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            infra/package-lock.json
            agent/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install infra deps
        run: cd infra && npm ci

      - name: CDK deploy
        run: cd infra && npx cdk deploy --require-approval never --outputs-file ../cdk-outputs.json

      - name: Build and push agent image
        run: |
          cd agent
          docker build --platform linux/amd64 -t ${{ env.ECR_REPO }} .
          docker tag ${{ env.ECR_REPO }}:latest ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:latest
          docker tag ${{ env.ECR_REPO }}:latest ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:latest
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
